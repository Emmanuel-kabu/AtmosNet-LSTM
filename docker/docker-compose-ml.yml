name: atm-forecast-ml
services:
  # ── API Service ──────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: atmosml-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
      - ../artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - atm-network

  # ── API (dev) ────────────────────────────────────────────────────────
  api-dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: atmosml-api-dev
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../src:/app/src
      - ../models:/app/models
      - ../data:/app/data
      - ../artifacts:/app/artifacts
    networks:
      - atm-network
    profiles:
      - dev

  # ── MLflow Tracking Server ──────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    container_name: atmosml-mlflow
    ports:
      - "5000:5000"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        pip install --quiet psycopg2-binary
        mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri postgresql://atm:atm_secret@postgres:5432/atm_forecast \
          --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - atm-network

  # ── Prometheus ──────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: atmosml-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - atm-network
    profiles:
      - monitoring

  # ── Grafana ─────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: atmosml-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/atm_forecast_dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - atm-network
    profiles:
      - monitoring

  # ── Postgres (pipeline watermarks / metadata) ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: atmosml-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: atm
      POSTGRES_PASSWORD: atm_secret
      POSTGRES_DB: atm_forecast
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atm -d atm_forecast"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - atm-network

  # ── Airflow (data pipeline orchestration) ───────────────────────────
  airflow-init:
    image: apache/airflow:2.10.4-python3.12
    container_name: atmosml-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@localhost || true
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://atm:atm_secret@postgres:5432/atm_forecast
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - atm-network
    profiles:
      - airflow

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.12
    container_name: atmosml-airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://atm:atm_secret@postgres:5432/atm_forecast
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: atm-forecast-secret
    volumes:
      - ../src/atm_forecast/orchestration/data_pipeline_airflow.py:/opt/airflow/dags/data_pipeline_airflow.py:ro
      - ../src:/opt/airflow/src:ro
      - ../data:/opt/airflow/data
      - ../artifacts:/opt/airflow/artifacts
      - airflow_logs:/opt/airflow/logs
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - atm-network
    profiles:
      - airflow

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.12
    container_name: atmosml-airflow-scheduler
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://atm:atm_secret@postgres:5432/atm_forecast
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ../src/atm_forecast/orchestration/data_pipeline_airflow.py:/opt/airflow/dags/data_pipeline_airflow.py:ro
      - ../src:/opt/airflow/src:ro
      - ../data:/opt/airflow/data
      - ../artifacts:/opt/airflow/artifacts
      - airflow_logs:/opt/airflow/logs
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - atm-network
    profiles:
      - airflow

volumes:
  mlflow_data:
  grafana_data:
  prometheus_data:
  postgres_data:
  airflow_logs:

networks:
  atm-network:
    driver: bridge
